name: Build and Package SermonPod

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name (e.g., v1.0.0)"
        required: true
        type: string

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Setup ffmpeg for bundling
        run: |
          mkdir -p ffmpeg-bin
          cp $(which ffmpeg) ffmpeg-bin/
          chmod +x ffmpeg-bin/ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install yt-dlp
          pip install staticx patchelf

      - name: Build with PyInstaller
        run: |
          pyinstaller --onedir \
                      --windowed \
                      --name SermonPod \
                      --add-binary "ffmpeg-bin/ffmpeg:." \
                      --hidden-import=yt_dlp \
                      --hidden-import=tkinter \
                      --hidden-import=_tkinter \
                      src/main.py

      - name: Download AppImage tools
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Make PyInstaller output static
        run: |
          cd dist/SermonPod
          staticx SermonPod SermonPod-static
          mv SermonPod-static SermonPod
          chmod +x SermonPod

      - name: Create AppImage structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy the PyInstaller bundle
          cp -r dist/SermonPod/* AppDir/usr/bin/

          # Create desktop entry
          cat > AppDir/usr/share/applications/sermonpod.desktop << 'EOF'
          [Desktop Entry]
          Name=SermonPod
          Exec=SermonPod
          Icon=sermonpod
          Type=Application
          Categories=AudioVideo;
          EOF

          # Create a simple icon (you can replace this with actual icon later)
          cat > AppDir/usr/share/icons/hicolor/256x256/apps/sermonpod.png << 'EOF'
          iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
          EOF

          # Create AppRun script
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/bin:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/SermonPod" "$@"
          EOF
          chmod +x AppDir/AppRun

          # Copy desktop file and icon to AppDir root
          cp AppDir/usr/share/applications/sermonpod.desktop AppDir/
          cp AppDir/usr/share/icons/hicolor/256x256/apps/sermonpod.png AppDir/

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir SermonPod-x86_64.AppImage
          chmod +x SermonPod-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SermonPod-Linux
          path: SermonPod-x86_64.AppImage
          retention-days: 30

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download and setup ffmpeg
        run: |
          brew install ffmpeg
          mkdir -p ffmpeg-bin
          cp $(which ffmpeg) ffmpeg-bin/
          chmod +x ffmpeg-bin/ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install yt-dlp

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile \
                      --windowed \
                      --name SermonPod \
                      --add-binary "ffmpeg-bin/ffmpeg:." \
                      --hidden-import=yt_dlp \
                      --hidden-import=tkinter \
                      --hidden-import=_tkinter \
                      src/main.py

      - name: Create archive
        run: |
          cd dist
          chmod +x SermonPod
          zip -r SermonPod-macOS.zip SermonPod

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SermonPod-macOS
          path: dist/SermonPod-macOS.zip
          retention-days: 30

  create-release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: SermonPod-Linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: SermonPod-macOS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            SermonPod-x86_64.AppImage
            SermonPod-macOS.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
