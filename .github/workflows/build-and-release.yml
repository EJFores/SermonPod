name: Build and Release SermonPod

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name (e.g., v1.0.0)"
        required: true
        type: string

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare ffmpeg for bundling
        run: |
          mkdir -p ffmpeg-bin
          cp $(which ffmpeg) ffmpeg-bin/
          chmod +x ffmpeg-bin/ffmpeg

      - name: Build with PyInstaller
        run: |
          pyinstaller SermonPod.spec --clean

      - name: Verify build
        run: |
          ls -lh dist/
          file dist/SermonPod

      - name: Make executable
        run: |
          chmod +x dist/SermonPod

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SermonPod-Linux
          path: dist/SermonPod
          retention-days: 30

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install ffmpeg
        run: |
          brew install ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare ffmpeg for bundling
        run: |
          mkdir -p ffmpeg-bin
          cp $(which ffmpeg) ffmpeg-bin/
          chmod +x ffmpeg-bin/ffmpeg

      - name: Build with PyInstaller
        run: |
          pyinstaller SermonPod.spec --clean

      - name: Verify build
        run: |
          ls -lh dist/
          if [ -d "dist/SermonPod.app" ]; then
            echo "✓ .app bundle created successfully"
            ls -lh dist/SermonPod.app/Contents/MacOS/
          else
            echo "✗ .app bundle not found, checking for binary..."
            ls -lh dist/
          fi

      - name: Create DMG (optional, can use ZIP instead)
        run: |
          cd dist
          # Create a simple ZIP for now (DMG creation requires additional tools)
          zip -r SermonPod-macOS-silicon.zip SermonPod.app

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SermonPod-macOS-silicon
          path: dist/SermonPod-macOS-silicon.zip
          retention-days: 30

  build-macos-intel:
    runs-on: macos-15-intel

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install ffmpeg
        run: |
          brew install ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare ffmpeg for bundling
        run: |
          mkdir -p ffmpeg-bin
          cp $(which ffmpeg) ffmpeg-bin/
          chmod +x ffmpeg-bin/ffmpeg

      - name: Build with PyInstaller
        run: |
          pyinstaller SermonPod.spec --clean

      - name: Verify build
        run: |
          ls -lh dist/
          if [ -d "dist/SermonPod.app" ]; then
            echo "✓ .app bundle created successfully"
            ls -lh dist/SermonPod.app/Contents/MacOS/
            file dist/SermonPod.app/Contents/MacOS/SermonPod
          else
            echo "✗ .app bundle not found, checking for binary..."
            ls -lh dist/
          fi

      - name: Create DMG (optional, can use ZIP instead)
        run: |
          cd dist
          # Create a simple ZIP for now (DMG creation requires additional tools)
          zip -r SermonPod-macOS-intel.zip SermonPod.app

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SermonPod-macOS-intel
          path: dist/SermonPod-macOS-intel.zip
          retention-days: 30

  create-release:
    needs: [build-linux, build-macos, build-macos-intel]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: SermonPod-Linux
          path: linux-build

      - name: Download macOS Silicon artifact
        uses: actions/download-artifact@v8
        with:
          name: SermonPod-macOS-silicon
          path: macos-silicon-build

      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v8
        with:
          name: SermonPod-macOS-intel
          path: macos-intel-build

      - name: Prepare release files
        run: |
          # Rename Linux binary for clarity
          mv linux-build/SermonPod SermonPod-Linux-x86_64
          chmod +x SermonPod-Linux-x86_64

          # Move macOS zips
          mv macos-silicon-build/SermonPod-macOS-silicon.zip .
          mv macos-intel-build/SermonPod-macOS-intel.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            SermonPod-Linux-x86_64
            SermonPod-macOS-silicon.zip
            SermonPod-macOS-intel.zip
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Download Instructions

            ### Linux
            1. Download `SermonPod-Linux-x86_64`
            2. Make it executable: `chmod +x SermonPod-Linux-x86_64`
            3. Run it: `./SermonPod-Linux-x86_64`

            ### macOS (Apple Silicon)
            1. Download `SermonPod-macOS-silicon.zip`
            2. Extract the ZIP file
            3. Double-click `SermonPod.app` to run

            ### macOS (Intel)
            1. Download `SermonPod-macOS-intel.zip`
            2. Extract the ZIP file
            3. Double-click `SermonPod.app` to run

            **Note**: On macOS, you may need to right-click the app and select "Open" the first time due to Gatekeeper security.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
