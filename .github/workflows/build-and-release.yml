name: Build and Package SermonPod

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget xz-utils

    - name: Download and setup ffmpeg
      run: |
        wget https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
        tar xf ffmpeg-release-amd64-static.tar.xz
        mkdir -p ffmpeg-bin
        mv ffmpeg-*-amd64-static/ffmpeg ffmpeg-bin/
        chmod +x ffmpeg-bin/ffmpeg

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install pyinstaller
        pip install yt-dlp

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile \
                    --windowed \
                    --name SermonPod \
                    --add-binary "ffmpeg-bin/ffmpeg:." \
                    --hidden-import=yt_dlp \
                    --hidden-import=tkinter \
                    --hidden-import=_tkinter \
                    src/main.py

    - name: Create archive
      run: |
        cd dist
        chmod +x SermonPod
        tar -czf SermonPod-Linux-x86_64.tar.gz SermonPod

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SermonPod-Linux
        path: dist/SermonPod-Linux-x86_64.tar.gz
        retention-days: 30

  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Download and setup ffmpeg
      run: |
        brew install ffmpeg
        mkdir -p ffmpeg-bin
        cp $(which ffmpeg) ffmpeg-bin/
        chmod +x ffmpeg-bin/ffmpeg

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install pyinstaller
        pip install yt-dlp

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile \
                    --windowed \
                    --name SermonPod \
                    --add-binary "ffmpeg-bin/ffmpeg:." \
                    --hidden-import=yt_dlp \
                    --hidden-import=tkinter \
                    --hidden-import=_tkinter \
                    src/main.py

    - name: Create archive
      run: |
        cd dist
        chmod +x SermonPod
        zip -r SermonPod-macOS.zip SermonPod

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SermonPod-macOS
        path: dist/SermonPod-macOS.zip
        retention-days: 30

  create-release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: SermonPod-Linux

    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: SermonPod-macOS

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          SermonPod-Linux-x86_64.tar.gz
          SermonPod-macOS.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
